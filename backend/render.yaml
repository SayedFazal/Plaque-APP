# Render blueprint. Point Render at this repo and it reads this file instead of you filling in a
# form by hand — which matters because the form is where people forget APP_BASE_URL and ship a
# backend that emails everyone dead localhost links.
services:
  - type: web
    name: periocompliance-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm ci --include=dev && npm run build
    # migrate deploy (not `migrate dev`) applies existing migrations without ever prompting or
    # generating new ones. `migrate dev` on a production database can offer to reset it.
    startCommand: npm run db:deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

      # Paste the SAME Neon URL you use locally. Render's own free Postgres expires after 90 days;
      # Neon's free tier does not, and having one database means the demo data you create while
      # testing is the data that is there on stage.
      - key: DATABASE_URL
        sync: false

      # Generated by Render, different from your local ones. That is correct and intended: a leaked
      # dev secret must not sign valid production tokens.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: 30

      # THE ONE THAT BREAKS EVERYTHING IF YOU GET IT WRONG.
      # Every verification and reset link in every email is built from this. Leave it as localhost
      # and your users receive links that only work on your laptop. Set it to the real Render URL
      # once Render has given you one.
      - key: APP_BASE_URL
        sync: false

      # Optional. Leave unset and emails print to the Render logs instead of being sent.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        value: PerioCompliance AI <no-reply@periocompliance.ai>
