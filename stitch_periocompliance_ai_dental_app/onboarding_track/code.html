<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf8ff;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }

        /* Glassmorphism Effect */
        .glass-overlay {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #e2e8f0;
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        /* Scanline Animation for Dental AI feel */
        @keyframes scanline {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scan-effect::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #004ac6, transparent);
            left: 0;
            z-index: 10;
            animation: scanline 4s linear infinite;
        }

        /* Custom Soft Shadow */
        .soft-shadow {
            box-shadow: 0px 4px 12px rgba(15, 23, 42, 0.05);
        }

        .active-dot {
            width: 24px;
            background-color: #004ac6;
            transition: all 0.3s ease;
        }
    </style>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.querySelector('button');
            btn.addEventListener('click', () => {

                console.log('Navigating to screen 2...');
            });

            // Parallax effect on illustration
            window.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) / 40;
                const moveY = (e.clientY - window.innerHeight / 2) / 40;
                const illustration = document.querySelector('.animate-float');
                if(illustration) {
                    illustration.style.transform = `translate(${moveX}px, ${moveY}px)`;
                }
            });
        });
    </script>
