<img class="w-full h-full object-cover" data-alt="A sophisticated 3D medical illustration of a glowing translucent human jaw and teeth being analyzed by a vibrant blue neural network. The network nodes and glowing connections represent AI processing, with digital scan lines and data points highlighting periodontal structures. The style is ultra-clean, clinical, and futuristic, following a premium Apple-inspired aesthetic with soft shadows, high-key lighting, and a palette of clinical blues and crisp whites. The background is a minimalist medical environment, emphasizing high-tech accuracy and professional dental compliance tools." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxGEdnKSFf5e8VDyxbij2Fya2KGDOPQTtXswsW_GYgvS25W2u24L5K3ol2kCPCCg20n5_ZXchVRxngQCfPyw76kEbqC6syTlseLStJ_DE4RJAJrTbgwWG-D19WtjLvxrWW8l8Pn5ZNsQYn9VmuPR-lzLgodsNm2p1WHJsrKtB1GCbZlDhzYwRM5OayE0H5SzDAnbF43NQ_CbP86JBJUALvLFYQvNM3DPVGaK5BtPGkled_SRCyuvjSBR3fzWigmDF8pvTAeGI-V6U"/>

<!-- Bottom Decorative Navigation Elements (Suppressed as per Task Logic for Onboarding) -->
<style>
        @keyframes scan {
            0% { transform: translateY(-20px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(320px); opacity: 0; }
        }
    </style>
<script>
        // Micro-interaction for the illustration
        document.querySelector('main').addEventListener('mousemove', (e) => {
            const img = document.querySelector('.relative.z-10');
            const rect = img.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width - 0.5;
            const y = (e.clientY - rect.top) / rect.height - 0.5;
            
            img.style.transform = `perspective(1000px) rotateY(${x * 5}deg) rotateX(${-y * 5}deg)`;
        });

        document.querySelector('main').addEventListener('mouseleave', () => {
            const img = document.querySelector('.relative.z-10');
            img.style.transform = `perspective(1000px) rotateY(0deg) rotateX(0deg)`;
            img.style.transition = 'transform 0.5s ease-out';
        });
    </script>
